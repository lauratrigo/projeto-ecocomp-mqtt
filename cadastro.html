<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | EcoComp</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="password-toggle.js" defer></script>
    <script src="cadastro.js" defer></script>
</head>

<body class="login-page">

    <div class="login-header">
        <div class="login-brand">
            <div class="login-brand-top">
                <img src="img/logo.png" alt="EcoComp" class="login-logo">
                <h1>Eco<span>Comp</span></h1>
            </div>

            <p class="login-slogan">
                Inteligência computacional aplicada ao monitoramento de ecossistemas.
            </p>
        </div>


        <main class="container auth-wrapper">
            <div class="card auth-card">

                <h2>Criar conta</h2>
                <p>Junte-se ao sistema EcoComp</p>

                <form id="formCadastro">

                    <div class="auth-form-group">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                    </div>

                    <div class="auth-form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>

                    <!-- SENHA com toggle -->
                    <div class="auth-form-group">
                        <label for="senha">Senha</label>

                        <div class="password-wrapper">
                            <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>

                            <button type="button" class="toggle-password" onclick="togglePassword(this)">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor"
                                        stroke-width="2" />
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="auth-form-group">
                        <label for="confirmar">Confirmar senha</label>

                        <div class="password-wrapper">
                            <input type="password" id="confirmar" name="confirmar" placeholder="Repita a senha"
                                required>

                            <button type="button" class="toggle-password" onclick="togglePassword(this)">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor"
                                        stroke-width="2" />
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="auth-form-group">
                        <label for="deviceId">Código da Estufa</label>
                        <input type="text" id="deviceId" name="deviceId" placeholder="Estufa (ex: estufa-001)" required>
                    </div>

                    <button type="submit" class="auth-btn">
                        Finalizar cadastro
                    </button>
                </form>

                <div class="auth-links">
                    Já possui uma conta? <a href="index.html">Faça login</a>
                </div>

            </div>
        </main>
    </div>

</body>

</html>
