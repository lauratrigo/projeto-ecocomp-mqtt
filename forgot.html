<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EcoComp</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="password-toggle.js"></script>
</head>

<body class="login-page">

    <div class="login-header">
        <div class="login-brand">
            <div class="login-brand-top">
                <img src="img/logo.png" alt="EcoComp" class="login-logo">
                <h1>Eco<span>Comp</span></h1>
            </div>

            <p class="login-slogan">
                Inteligência computacional aplicada ao monitoramento de ecossistemas.
            </p>
        </div>

        <main class="container auth-wrapper">
            <div class="card auth-card">

                <h2>Recuperar senha</h2>
                <p>Digite seu e-mail para redefinir sua senha</p>

                <form id="formForgot">

                    <div class="auth-form-group">
                        <label>E-mail</label>
                        <input type="email" id="emailForgot" required placeholder="seu@email.com">
                    </div>

                    <button class="auth-btn">Continuar</button>
                </form>

                <div class="auth-links">
                    <a href="index.html">Voltar ao login</a>
                </div>

            </div>
        </main>

</body>
