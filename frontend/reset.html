<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EcoComp</title>

    <link rel="icon" type="image/png" href="img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="reset-password.js" defer></script>
</head>

<body class="login-page">

    <div class="login-header">
        <div class="login-brand">
            <div class="login-brand-top">
                <img src="img/logo.png" alt="EcoComp" class="login-logo">
                <h1>Eco<span>Comp</span></h1>
            </div>

            <p class="login-slogan">
                Inteligência computacional aplicada ao monitoramento de ecossistemas.
            </p>
        </div>

        <main class="container auth-wrapper">
            <div class="card auth-card">

                <h2>Nova senha</h2>
                <p>Crie uma nova senha para sua conta</p>

                <form id="formReset">

                    <div class="auth-form-group">
                        <label>Nova senha</label>
                        <input type="password" id="newPassword" required>
                    </div>

                    <div class="auth-form-group">
                        <label>Confirmar senha</label>
                        <input type="password" id="confirmPassword" required>
                    </div>

                    <button class="auth-btn">Redefinir senha</button>
                </form>

            </div>
        </main>

</body>
</html>
