<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EcoComp</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="password-toggle.js"></script>
    <script src="login.js" defer></script>
</head>

<body class="login-page">

    <div class="login-header">
        <div class="login-brand">
            <div class="login-brand-top">
                <img src="img/logo.png" alt="EcoComp" class="login-logo">
                <h1>Eco<span>Comp</span></h1>
            </div>

            <p class="login-slogan">
                Inteligência computacional aplicada ao monitoramento de ecossistemas.
            </p>
        </div>


        <main class="container auth-wrapper">
            <div class="card auth-card">
                <h2>Bem-vindo de volta!</h2>
                <p>Faça login para acessar seu Dashboard.</p>

                <form id="formLogin">
                    <div class="auth-form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="auth-form-group">
                        <label for="senha">Senha</label>

                        <div class="password-wrapper">
                            <input type="password" id="senha" name="senha" placeholder="••••••••" required>

                            <button type="button" class="toggle-password" onclick="togglePassword(this)"> <svg
                                    viewBox="0 0 24 24" fill="none">
                                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor"
                                        stroke-width="2" />
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">Entrar</button>
                </form>

                <div class="auth-links">
                    Ainda não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a>
                </div>
                <div class="auth-links">
                    <a href="forgot.html">Esqueci minha senha</a>
                </div>
            </div>
        </main>

</body>

</html>
